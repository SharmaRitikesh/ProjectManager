# Application Configuration (Production)
spring.application.name=ProjectManager

# Server Configuration
server.port=${PORT:8080}

# Database Configuration (PostgreSQL for Heroku)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:projectmanager}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT Configuration
jwt.secret=${JWT_SECRET:ProjectManagerSecretKeyForJWTTokenGeneration2024VerySecureKey}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.projectmanager=INFO
logging.level.org.springframework.security=WARN

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
