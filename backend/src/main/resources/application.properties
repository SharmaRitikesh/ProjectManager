# Application Configuration (Production)
spring.application.name=ProjectManager

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# For production: Set DATABASE_URL as full JDBC URL (jdbc:postgresql://...)
# For local: Uses H2 in-memory database
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:projectmanager}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT Configuration
jwt.secret=${JWT_SECRET:ProjectManagerSecretKeyForJWTTokenGeneration2024VerySecureKey}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.projectmanager=INFO
logging.level.org.springframework.security=WARN

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
