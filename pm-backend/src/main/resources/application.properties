# Application Configuration (Production)
spring.application.name=ProjectManager

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# For production: Use individual DB properties
# For local: Uses H2 in-memory database (set DB_HOST to empty or don't set it)
spring.datasource.url=${DB_HOST:jdbc:h2:mem:projectmanager}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP Configuration for Neon Serverless PostgreSQL
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:ProjectManagerSecretKeyForJWTTokenGeneration2024VerySecureKey}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.projectmanager=INFO
logging.level.org.springframework.security=WARN

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
